<!DOCTYPE html>
<html>
<head>
<title>Order Bill - Datta & Ajay Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✅ Your Order</h1>
<section id="orders"></section>
<a href="index.html"><button>🏠 Back to Store</button></a>

<script>
const orders = JSON.parse(localStorage.getItem("orders")) || [];
const container = document.getElementById("orders");
orders.slice(-1).forEach(order=>{
  const div = document.createElement("div");
  div.innerHTML = `
    <h2>Order ID: ${order.id}</h2>
    <p>Date: ${order.date}</p>
    <p>Payment Method: ${order.method}</p>
    <p>Total: ₹${order.total}</p>
    <h3>Items:</h3>
    <ul>${order.items.map(i=>`<li>${i.name} x ${i.qty} - ₹${i.price}</li>`).join("")}</ul>
  `;
  container.appendChild(div);
});
</script>

</body>
</html>

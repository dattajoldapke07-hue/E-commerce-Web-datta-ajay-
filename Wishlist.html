<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wishlist - Datta & Ajay Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>❤️ Your Wishlist</h1>
  <a href="index.html"><button>🏠 Home</button></a>
  <a href="cart.html"><button>🛒 Cart</button></a>
</header>

<section id="wishlist-items"></section>

<script>
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

function renderWishlist(){
  const container = document.getElementById("wishlist-items");
  container.innerHTML="";
  wishlist.forEach(item=>{
    const div = document.createElement("div");
    div.innerHTML = `
      <img src="${item.image}" width="80">
      ${item.name} - ₹${item.price}
      <button onclick="addToCart(${item.id})">🛒 Add to Cart</button>
      <button onclick="removeWishlist(${item.id})">❌ Remove</button>
    `;
    container.appendChild(div);
  });
}

function addToCart(id){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const product = wishlist.find(i=>i.id===id);
  let exist = cart.find(i=>i.id===id);
  if(exist) exist.qty += 1;
  else { product.qty=1; cart.push(product);}
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to Cart ✅");
}

function removeWishlist(id){
  wishlist = wishlist.filter(i=>i.id!==id);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  renderWishlist();
}

renderWishlist();
</script>

</body>
</html>
